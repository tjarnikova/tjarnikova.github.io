<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA Monitor — TOM12_TJ_HA00 — 1995–2000</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif;
          background: #f5f5f5; color: #1a1a1a; }
  header { background: #1a1a1a; color: #f5f5f5; padding: 18px 32px; }
  header h1 { font-size: 1.3em; font-weight: 500; letter-spacing: 0.03em; }
  header p  { font-size: 0.85em; color: #aaa; margin-top: 4px; }

  .tab-bar { display: flex; background: #2d2d2d; padding: 0 32px; }
  .tab-bar button {
    background: none; border: none; color: #bbb;
    padding: 12px 22px; font-size: 0.95em; cursor: pointer;
    border-bottom: 3px solid transparent; transition: all 0.15s;
  }
  .tab-bar button:hover  { color: #fff; }
  .tab-bar button.active { color: #fff; border-bottom-color: #4477AA; }

  .tab-content { display: none; padding: 28px 32px; }
  .tab-content.active { display: block; }

  .plot-grid { display: grid; gap: 24px; }
  .plot-grid.cols-1 { grid-template-columns: 1fr; }
  .plot-grid.cols-2 { grid-template-columns: 1fr 1fr; }

  .plot-card {
    background: #fff; border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.10); overflow: hidden;
  }
  .plot-card h2 {
    font-size: 0.85em; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; color: #666;
    padding: 10px 16px; border-bottom: 1px solid #eee;
  }
  .plot-card img {
    width: 100%; height: auto; display: block;
  }
  .plot-card .missing {
    padding: 40px; text-align: center; color: #aaa; font-size: 0.9em;
  }

  footer {
    text-align: center; font-size: 0.75em; color: #aaa;
    padding: 20px; border-top: 1px solid #ddd; margin-top: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>NA Monitor — TOM12_TJ_HA00 — 1995–2000</h1>
  <p>North Atlantic diagnostic monitor suite  ·  years 1995–2000</p>
</header>

<div class="tab-bar">
  <button class="active" onclick="showTab(event,'tab-physical')">Physical</button>
  <button onclick="showTab(event,'tab-bgc')">BGC &amp; Ecosystem</button>
  <button onclick="showTab(event,'tab-eco-ts')">Ecosystem timeseries</button>
</div>

<!-- Tab 1: Physical -->
<div id="tab-physical" class="tab-content active">
  <div class="plot-grid cols-1">
    <div class="plot-card"><h2>Physical monitor (maps)</h2><img src="./TOM12_TJ_HA00_na_monitor_mar_1995_2000.png" alt="Physical monitor (maps)"></div>
    <div class="plot-card"><h2>Physical timeseries</h2><img src="./TOM12_TJ_HA00_ts_physical_1920_2024.png" alt="Physical timeseries"></div>
  </div>
</div>

<!-- Tab 2: BGC & Ecosystem maps -->
<div id="tab-bgc" class="tab-content">
  <div class="plot-grid cols-1">
    <div class="plot-card"><h2>BGC monitor (maps)</h2><img src="./TOM12_TJ_HA00_bgc_monitor_annual_1995_2000.png" alt="BGC monitor (maps)"></div>
    <div class="plot-card"><h2>Ecosystem monitor (maps)</h2><img src="./TOM12_TJ_HA00_eco_monitor_2020_2024.png" alt="Ecosystem monitor (maps)"></div>
  </div>
</div>

<!-- Tab 3: Ecosystem timeseries -->
<div id="tab-eco-ts" class="tab-content">
  <div class="plot-grid cols-1">
    <div class="plot-card"><h2>BGC & plankton timeseries</h2><img src="./TOM12_TJ_HA00_ts_bgc_1920_2024.png" alt="BGC & plankton timeseries"></div>
  </div>
</div>

<footer>
  Generated by make_report.py &nbsp;·&nbsp; TOM12_TJ_HA00 &nbsp;·&nbsp; 1995–2000
</footer>

<script>
function showTab(evt, tabId) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  evt.currentTarget.classList.add('active');
}
</script>
</body>
</html>
